<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Human-Readable</title>
  <link rel="stylesheet" href="style.css">
  <script>(function(){var t=localStorage.getItem('theme');if(t==='green'||t==='amber')document.documentElement.className=t;}());</script>
</head>
<body>
  <header>
    <div class="site-title"><a href="/">HUMAN-READABLE</a></div>
    <div class="site-tagline">notes from the interface between people and computers</div>
  </header>

  <main id="main">
    <div class="comic-header">
      <span class="comic-number" id="comic-number"></span>
      <h1 class="comic-title" id="comic-title">Loading...</h1>
    </div>

    <div class="comic-frame">
      <img id="comic-img" src="" alt="" />
      <div id="comic-empty" class="comic-empty" hidden>No comics yet. Check back soon.</div>
    </div>

    <nav class="comic-nav" aria-label="Comic navigation">
      <button id="btn-first" title="First comic">|&lt;</button>
      <button id="btn-prev" title="Previous comic">&lt; prev</button>
      <button id="btn-random" title="Random comic">random</button>
      <button id="btn-next" title="Next comic">next &gt;</button>
      <button id="btn-last" title="Latest comic">&gt;|</button>
    </nav>
  </main>

  <footer>
    <a href="https://github.com/wiegerthefarmer/human-readable/issues/new?template=comic-submission.yml">submit a comic</a>
    <span class="footer-sep">·</span>
    <a href="https://github.com/wiegerthefarmer/human-readable">source</a>
    <span class="footer-sep">·</span>
    <button id="btn-theme" title="Switch theme">light</button>
  </footer>

  <script src="comic.js"></script>
</body>
</html>
