name: Sync comics to Printful

on:
  push:
    branches: [main]
    paths:
      - 'comics/*/comic.png'

permissions:
  contents: write

jobs:
  printful-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Push new comics to Printful
        env:
          PRINTFUL_API_KEY: ${{ secrets.PRINTFUL_API_KEY }}
          PRINTFUL_STORE_ID: ${{ secrets.PRINTFUL_STORE_ID }}
          PRINTFUL_STORE_BASE_URL: ${{ vars.PRINTFUL_STORE_BASE_URL }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
        run: python3 .github/scripts/printful_push.py

      - name: Commit printful.json files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 'comics/*/printful.json'
          git diff --cached --quiet || git commit -m "chore: add Printful product links"
          git push
